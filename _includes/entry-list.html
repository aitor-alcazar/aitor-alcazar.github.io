<ul class="entry-list">
  {% for entry in include.entries %}
    <li>
      <strong>{{ entry.title }}</strong>
      {% if entry.meta %}<span class="muted"> · {{ entry.meta }}</span>{% endif %}
      {% if entry.url %}
        · <a href="{{ entry.url }}">Link</a>
      {% endif %}
    </li>
  {% endfor %}
</ul>
