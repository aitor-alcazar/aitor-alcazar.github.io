<div class="carousel" aria-label="Project carousel" data-carousel>
  <div class="carousel-viewport">
    {% for card in include.cards %}
      <article class="carousel-slide{% if forloop.first %} active{% endif %}" data-carousel-slide="{{ forloop.index0 }}">
        <div class="card-item">
          <h3>{{ card.title }}</h3>
          <p>{{ card.description }}</p>
          {% if card.url %}
            <a href="{{ card.url | relative_url }}" class="card-link">Open card →</a>
          {% endif %}
        </div>
      </article>
    {% endfor %}
  </div>
  <div class="carousel-footer">
    <div class="carousel-controls">
      <button type="button" class="carousel-prev" aria-label="Previous project">←</button>
      <button type="button" class="carousel-next" aria-label="Next project">→</button>
    </div>
    <div class="carousel-status" aria-live="polite">1 / {{ include.cards | size }}</div>
  </div>
  <div class="carousel-indicators" role="tablist">
    {% for card in include.cards %}
      <button type="button" class="carousel-indicator{% if forloop.first %} active{% endif %}" aria-label="Show project {{ forloop.index }}" aria-pressed="{% if forloop.first %}true{% else %}false{% endif %}" data-carousel-index="{{ forloop.index0 }}"></button>
    {% endfor %}
  </div>
  <noscript>
    <div class="carousel-fallback">
      {% for card in include.cards %}
        <article class="card-item">
          <h3>{{ card.title }}</h3>
          <p>{{ card.description }}</p>
          {% if card.url %}
            <a href="{{ card.url | relative_url }}">Open card →</a>
          {% endif %}
        </article>
      {% endfor %}
    </div>
  </noscript>
</div>
