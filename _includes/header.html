<header class="site-header">
  <div class="container nav-wrap">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav aria-label="Primary">
      <a href="{{ '/' | relative_url }}#projects">Projects</a>
    </nav>
    <div class="theme-switcher" role="group" aria-label="Theme selector">
      <button type="button" data-theme-choice="auto" aria-label="Use system theme">Auto</button>
      <button type="button" data-theme-choice="light" aria-label="Use light theme">Light</button>
      <button type="button" data-theme-choice="dark" aria-label="Use dark theme">Dark</button>
    </div>
  </div>
</header>
