<div class="project-list">
  {% for card in include.cards %}
    <div class="project-row">
      {% if card.url %}
        <a href="{{ card.url | relative_url }}" class="project-name">{{ card.title }}</a>
      {% else %}
        <span class="project-name">{{ card.title }}</span>
      {% endif %}
      <span class="project-description">{{ card.description }}</span>
    </div>
  {% endfor %}
</div>
