<div class="card-grid">
  {% for card in include.cards %}
    <article class="card-item">
      <h3>{{ card.title }}</h3>
      <p>{{ card.description }}</p>
      {% if card.url %}
        <a href="{{ card.url | relative_url }}" class="card-link">Open card →</a>
      {% endif %}
    </article>
  {% endfor %}
</div>
